<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events - EventNest</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="orb-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<canvas id="particles"></canvas>

<nav class="navbar" id="navbar">
  <div class="container">
    <a href="index.html" class="logo"><i class="fas fa-calendar-star"></i> EventNest</a>
    <ul class="nav-menu" id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="events.html" class="active">Events</a></li>
      <li><a href="categories.html">Categories</a></li>
      <li><a href="my-bookings.html">My Bookings</a></li>
    </ul>
        <div style="display:flex; align-items:center; gap: 14px;">
      <button class="theme-toggle" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
      <div class="user-menu-wrap" id="userMenuWrap"></div>
      <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Browse <span style="color:var(--primary)">Events</span></h1>
    <p>Find the perfect event for you from our curated collection.</p>
  </div>
</div>

<section class="section" style="padding-top:0;">
  <div class="container">
    <div class="filter-bar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search events by name or venue...">
      </div>
      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>
    </div>
    <div class="events-grid" id="allEvents"></div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      &copy; 2026 EventNest. All rights reserved.
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
(function(){
  const canvas = document.getElementById('particles');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);
  const isDark=()=>document.documentElement.getAttribute('data-theme')==='dark';
  for(let i=0;i<55;i++) particles.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+0.5,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,alpha:Math.random()*.4+.1});
  function draw(){
    ctx.clearRect(0,0,W,H);
    const color=isDark()?'162,155,254':'108,92,231';
    particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${color},${p.alpha})`;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;});
    requestAnimationFrame(draw);
  }
  draw();
})();
window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>30));
document.getElementById('hamburger').addEventListener('click',function(){this.classList.toggle('active');document.getElementById('navMenu').classList.toggle('active');});
</script>
</body>
</html>
