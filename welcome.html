<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventNest – Welcome</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Welcome Page ── */
.welcome-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; padding: 40px 20px; }
.welcome-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px; padding: 56px 48px; max-width: 460px; width: 100%; text-align: center; box-shadow: 0 24px 80px rgba(108,92,231,0.18); position: relative; z-index: 2; }
.welcome-logo { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; }
.welcome-logo i { font-size: 2rem; }
.welcome-tagline { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; }
.welcome-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
.welcome-title span { color: var(--primary); }
.welcome-desc { color: var(--text-muted); font-size: 0.93rem; margin-bottom: 36px; line-height: 1.7; }
.welcome-actions { display: flex; flex-direction: column; gap: 14px; }
.welcome-actions .btn { width: 100%; justify-content: center; padding: 14px 24px; font-size: 1rem; border-radius: 12px; }
.welcome-divider { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 0.82rem; margin: 4px 0; }
.welcome-divider::before, .welcome-divider::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }
.welcome-stats { display: flex; justify-content: center; gap: 32px; margin-top: 36px; padding-top: 28px; border-top: 1px solid var(--card-border); }
.welcome-stat { text-align: center; }
.welcome-stat strong { display: block; font-size: 1.3rem; font-weight: 700; color: var(--primary); }
.welcome-stat span { font-size: 0.78rem; color: var(--text-muted); }
.theme-corner { position: fixed; top: 20px; right: 20px; z-index: 100; }
@media(max-width:480px){ .welcome-card{ padding:40px 24px; } .welcome-stats{ gap:20px; } }
</style>
</head>
<body>

<div class="orb-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<canvas id="particles" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

<button class="theme-toggle theme-corner" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>

<div class="welcome-page">
  <div class="welcome-card">
    <div class="welcome-logo"><i class="fas fa-calendar-star"></i> EventNest</div>
    <p class="welcome-tagline">Your gateway to amazing experiences</p>

    <h1 class="welcome-title">Discover &amp; Book<br><span>Events Near You</span></h1>
    <p class="welcome-desc">From tech conferences to music festivals — find, book, and manage events you'll love. Join thousands of happy attendees today.</p>

    <div class="welcome-actions">
      <a href="auth.html?mode=register" class="btn btn-primary">
        <i class="fas fa-user-plus"></i> Create Account
      </a>
      <div class="welcome-divider">already have an account?</div>
      <a href="auth.html?mode=login" class="btn btn-outline">
        <i class="fas fa-right-to-bracket"></i> Sign In
      </a>
    </div>

    <div class="welcome-stats">
      <div class="welcome-stat"><strong>500+</strong><span>Events</span></div>
      <div class="welcome-stat"><strong>50K+</strong><span>Attendees</span></div>
      <div class="welcome-stat"><strong>120</strong><span>Cities</span></div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
// Redirect if already logged in
(function(){
  if(localStorage.getItem('ems_user_session')){
    window.location.replace('index.html');
  }
})();
// Particles
(function(){
  const c=document.getElementById('particles'); if(!c)return;
  const ctx=c.getContext('2d'); let W,H,pts=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const isDark=()=>document.documentElement.getAttribute('data-theme')==='dark';
  for(let i=0;i<60;i++) pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2+0.5,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,alpha:Math.random()*.5+.1});
  function draw(){
    ctx.clearRect(0,0,W,H);
    const col=isDark()?'162,155,254':'108,92,231';
    pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${col},${p.alpha})`;ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;});
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
